# Claude Plugins Official Workflow Add Plugin To Marketplace

## Action

Follow the add-plugin-to-marketplace workflow:
1. Add or update entry in .claude-plugin/marketplace.json
2. If new plugin: add plugin files under external_plugins/<plugin> or plugins/<plugin> (including .claude-plugin/plugin.json, .mcp.json, README.md, LICENSE, package.json, server.ts, etc.)
3. If only updating: bump SHA or version in marketplace.json

